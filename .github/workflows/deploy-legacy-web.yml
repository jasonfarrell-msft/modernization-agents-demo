name: Deploy legacy web app

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'legacy-upload-demo/OgeFieldOps.Web/**'
      - '.github/workflows/deploy-legacy-web.yml'
      - 'scripts/deploy-iis.ps1'

permissions:
  contents: read

concurrency:
  group: legacy-web-iis-deploy
  cancel-in-progress: false

env:
  PROJECT_PATH: legacy-upload-demo/OgeFieldOps.Web/OgeFieldOps.Web.csproj
  PACKAGES_CONFIG: legacy-upload-demo/OgeFieldOps.Web/packages.config
  PACKAGES_DIR: legacy-upload-demo/packages
  IIS_SITE_NAME: OgeFieldOps
  IIS_APP_POOL: OgeFieldOps
  IIS_SITE_PATH: C:\inetpub\wwwroot\OgeFieldOps
  IIS_BINDING_PORT: '80'
  DATA_ROOT: C:\OGE

jobs:
  build:
    name: Build (MSBuild, .NET Framework 4.8)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        shell: pwsh
        run: nuget restore $env:PACKAGES_CONFIG -PackagesDirectory $env:PACKAGES_DIR

      - name: Build and publish (FileSystem)
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:RUNNER_TEMP 'oge-site'
          msbuild $env:PROJECT_PATH `
            /p:Configuration=Release `
            /p:DeployOnBuild=true `
            /p:WebPublishMethod=FileSystem `
            /p:DeleteExistingFiles=True `
            /p:AutoParameterizationWebConfigConnectionStrings=False `
            /p:publishUrl=$publishDir `
            /m
          # Some MSBuild/VS versions emit the site to the package staging folder
          # instead of publishUrl. Fall back to PackageTmp if needed.
          if (-not (Test-Path (Join-Path $publishDir 'Web.config'))) {
            $projDir = Split-Path $env:PROJECT_PATH -Parent
            $packageTmp = Join-Path $projDir 'obj\Release\Package\PackageTmp'
            if (Test-Path (Join-Path $packageTmp 'Web.config')) {
              Write-Host "publishUrl was empty; copying from $packageTmp"
              New-Item -ItemType Directory -Force -Path $publishDir | Out-Null
              Copy-Item -Path (Join-Path $packageTmp '*') -Destination $publishDir -Recurse -Force
            }
          }
          if (-not (Test-Path (Join-Path $publishDir 'Web.config'))) {
            throw "Published site not found (no Web.config in $publishDir)."
          }
          "PUBLISH_DIR=$publishDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: oge-site
          path: ${{ env.PUBLISH_DIR }}
          if-no-files-found: error

  deploy:
    name: Deploy to IIS (self-hosted)
    needs: build
    runs-on:
      - self-hosted
      - Windows
      - X64
      - iis-deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: oge-site
          path: ${{ runner.temp }}\oge-site

      - name: Deploy to IIS
        shell: powershell
        run: |
          ./scripts/deploy-iis.ps1 `
            -PublishPath "$env:RUNNER_TEMP\oge-site" `
            -SiteName $env:IIS_SITE_NAME `
            -AppPoolName $env:IIS_APP_POOL `
            -SitePath $env:IIS_SITE_PATH `
            -BindingPort ([int]$env:IIS_BINDING_PORT) `
            -DataRoot $env:DATA_ROOT
